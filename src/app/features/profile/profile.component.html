<div class="page">
  <div class="page-header">
    <h1 class="page-title">Profile</h1>
    <p class="page-sub">Update your personal information.</p>
  </div>

  <div class="loading" *ngIf="isLoading">Loading...</div>

  <div class="card" *ngIf="!isLoading">
    <form [formGroup]="profileForm" (ngSubmit)="onSubmit()">

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">First name</label>
          <input class="form-input" type="text" formControlName="firstName">
        </div>
        <div class="form-group">
          <label class="form-label">Last name</label>
          <input class="form-input" type="text" formControlName="lastName">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Phone</label>
        <input class="form-input" type="text" formControlName="phone">
      </div>

      <div class="form-group">
        <label class="form-label">Department</label>
        <input class="form-input" type="text" formControlName="department">
      </div>

      <div class="form-group">
        <label class="form-label">Preferred language</label>
        <input class="form-input" type="text" formControlName="preferredLanguage">
      </div>

      <div class="success-msg" *ngIf="successMessage">{{ successMessage }}</div>
      <div class="error-msg" *ngIf="errorMessage">{{ errorMessage }}</div>

      <button class="btn-primary" type="submit" [disabled]="isSaving">
        {{ isSaving ? 'Saving...' : 'Save changes' }}
      </button>

    </form>
  </div>
</div>
