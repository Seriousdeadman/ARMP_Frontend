<p class="error" *ngIf="error">{{ error }}</p>

<header class="lv-head">
  <h1>Leave inbox</h1>
</header>

<div class="lv-filters panel">
  <div class="form-grid">
    <label class="full">
      Search
      <input [(ngModel)]="searchQuery" placeholder="Employee, email, type, status..." />
    </label>
    <label>
      Status
      <select [(ngModel)]="statusFilter">
        <option value="ALL">All</option>
        <option value="PENDING">PENDING</option>
        <option value="APPROVED">APPROVED</option>
        <option value="REJECTED">REJECTED</option>
      </select>
    </label>
    <label>
      Type
      <select [(ngModel)]="typeFilter">
        <option value="ALL">All</option>
        <option value="ANNUAL">ANNUAL</option>
        <option value="SICK">SICK</option>
        <option value="EXCEPTIONAL">EXCEPTIONAL</option>
      </select>
    </label>
  </div>
</div>

<div class="lv-list panel">
  <h2>Pending</h2>
  <ul class="lv-ul" *ngIf="filteredPendingLeaves.length > 0; else noPending">
    <li *ngFor="let l of filteredPendingLeaves">
      <button
        type="button"
        class="lv-row"
        [class.active]="selectedLeave?.id === l.id"
        (click)="selectLeave(l)">
        <span class="lv-row-title">{{ l.employee.name }}</span>
        <span class="lv-row-dates">{{ l.startDate }} – {{ l.endDate }}</span>
        <span class="lv-row-type">{{ l.type }}</span>
        <span class="badge badge--status-pending">Pending</span>
      </button>
    </li>
  </ul>
  <ng-template #noPending>
    <p class="muted">No pending requests.</p>
  </ng-template>

  <h2 class="lv-hist-title">History</h2>
  <ul class="lv-ul" *ngIf="filteredHistoricalLeaves.length > 0; else noHist">
    <li *ngFor="let l of filteredHistoricalLeaves">
      <button
        type="button"
        class="lv-row lv-row-hist"
        [class.active]="selectedLeave?.id === l.id"
        (click)="selectLeave(l)">
        <span class="lv-row-title">{{ l.employee.name }}</span>
        <span class="badge" [ngClass]="{
          'badge--status-approved': l.status === 'APPROVED',
          'badge--status-pending': l.status === 'PENDING',
          'badge--status-rejected': l.status === 'REJECTED'
        }">{{ l.status }}</span>
      </button>
    </li>
  </ul>
  <ng-template #noHist>
    <p class="muted">No history.</p>
  </ng-template>
</div>

<app-slide-over-panel
  [open]="!!selectedLeave"
  title="Leave context"
  (closed)="selectedLeave = null">
  <div *ngIf="selectedLeave" class="lv-slide-body">
    <div *ngIf="contextLoading">Loading employee…</div>
    <ng-container *ngIf="!contextLoading">
      <dl class="ctx-dl">
        <div>
          <dt>Employee</dt>
          <dd>{{ selectedLeave.employee.name }}</dd>
        </div>
        <div>
          <dt>Dates</dt>
          <dd>{{ selectedLeave.startDate }} – {{ selectedLeave.endDate }}</dd>
        </div>
        <div>
          <dt>Type</dt>
          <dd>{{ selectedLeave.type }}</dd>
        </div>
        <div *ngIf="contextEmployee">
          <dt>Leave balance</dt>
          <dd class="ctx-balance">{{ contextEmployee.leaveBalance }} days remaining</dd>
        </div>
      </dl>
      <div class="ctx-actions" *ngIf="selectedLeave.status === 'PENDING'">
        <button type="button" class="btn btn--primary btn--full" (click)="approve(selectedLeave.id)">Approve</button>
        <button type="button" class="btn btn--outline btn--full danger" (click)="reject(selectedLeave.id)">Reject</button>
      </div>
    </ng-container>
  </div>
</app-slide-over-panel>
