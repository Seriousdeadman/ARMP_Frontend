<p class="error" *ngIf="error">{{ error }}</p>

<header class="emp-head">
  <h1>Employee drafts</h1>
  <button type="button" class="btn-add" (click)="openNew()">Add employee</button>
</header>

<div class="filters emp-filters">
  <label>
    Search
    <input [(ngModel)]="searchQuery" placeholder="Name, email, grade, department..." />
  </label>
  <label>
    Grade
    <select [(ngModel)]="selectedGradeFilter">
      <option value="ALL">All</option>
      <option *ngFor="let g of grades" [value]="g.id">{{ g.name }}</option>
    </select>
  </label>
  <label>
    Department
    <select [(ngModel)]="selectedDepartmentFilter">
      <option value="ALL">All</option>
      <option *ngFor="let d of departments" [value]="d.id">{{ d.name }}</option>
    </select>
  </label>
</div>

<div class="emp-grid" *ngIf="!isLoading">
  <button
    type="button"
    *ngFor="let e of filteredEmployees"
    class="emp-card"
    (click)="openEdit(e)">
    <div class="emp-avatar" [attr.aria-hidden]="true">{{ initials(e.name) }}</div>
    <span class="status-dot" [class]="statusDotClass(e.status)" [attr.aria-label]="e.status ?? 'ACTIVE'"></span>
    <div class="emp-card-name">
      {{ e.name }}
      <span *ngIf="e.status === 'PENDING_VALIDATION'" class="badge badge--status-pending" style="font-size: 0.65rem; margin-left: 0.5rem;">Pending validation</span>
      <span *ngIf="e.status === 'ACTIVE' || !e.status" class="badge badge--status-active" style="font-size: 0.65rem; margin-left: 0.5rem;">Active</span>
    </div>
    <div class="emp-card-meta">{{ e.department.name }}</div>
    <div class="emp-card-leave" [class.negative]="e.leaveBalance < 0">{{ e.leaveBalance }} days leave</div>
  </button>
</div>

<div class="emp-skeleton-grid" *ngIf="isLoading">
  <div class="emp-skel" *ngFor="let _ of [1,2,3,4,5,6,7,8]"></div>
</div>

<p *ngIf="!isLoading && filteredEmployees.length === 0" class="muted">No employees match your filters.</p>

<section class="panel emp-salary">
  <h2>Salary calculator</h2>
  <div class="form-grid">
    <label>
      Employee
      <select [(ngModel)]="salaryEmployeeId">
        <option value="">-- Select --</option>
        <option *ngFor="let e of employees" [value]="e.id">{{ e.name }}</option>
      </select>
    </label>
  </div>
  <div class="toolbar">
    <button type="button" (click)="calculateSalary()">Calculate monthly pay</button>
  </div>
  <div *ngIf="salaryResult" class="salary-result">
    <div class="res-row"><span>Base Salary:</span> <strong>{{ salaryResult.baseSalary }}</strong></div>
    <div class="res-row" *ngIf="salaryResult.deduction > 0"><span>Deduction (Negative Leave):</span> <strong class="danger">-{{ salaryResult.deduction }}</strong></div>
    <div class="res-row total"><span>Net Salary:</span> <strong class="success">{{ salaryResult.calculatedSalary }}</strong></div>
  </div>
</section>

<app-slide-over-panel
  [open]="panelOpen"
  [title]="selectedId ? 'Edit employee' : 'New employee'"
  (closed)="closePanel()">
  <div class="form-grid">
    <label><span>Name</span><input [(ngModel)]="form.name" /></label>
    <label><span>Email</span><input [(ngModel)]="form.email" /></label>
    <label><span>Hire date</span><input type="date" [(ngModel)]="form.hireDate" /></label>
    <label><span>Leave balance</span><input type="number" [(ngModel)]="form.leaveBalance" /></label>
    <label>
      Grade
      <select [(ngModel)]="form.gradeId">
        <option value="">-- Select --</option>
        <option *ngFor="let g of grades" [value]="g.id">{{ g.name }}</option>
      </select>
    </label>
    <label>
      Department
      <select [(ngModel)]="form.departmentId">
        <option value="">-- Select --</option>
        <option *ngFor="let d of departments" [value]="d.id">{{ d.name }}</option>
      </select>
    </label>
    <label *ngIf="currentRole === UserRole.SUPER_ADMIN">
      Status
      <select [(ngModel)]="form.status">
        <option value="ACTIVE">ACTIVE</option>
        <option value="PENDING_VALIDATION">PENDING_VALIDATION (DRAFT)</option>
      </select>
    </label>
  </div>
  <div class="toolbar so-toolbar">
    <button type="button" class="btn btn--primary" *ngIf="selectedId && form.status === 'PENDING_VALIDATION' && currentRole === UserRole.SUPER_ADMIN" (click)="approve()">Approve</button>
    <button type="button" class="btn btn--outline danger" *ngIf="selectedId" (click)="remove()">Remove</button>
    <button type="button" class="btn btn--primary" *ngIf="!selectedId" (click)="create()">Create</button>
    <button type="button" class="btn btn--primary" *ngIf="selectedId" (click)="update()">Save</button>
  </div>
</app-slide-over-panel>
