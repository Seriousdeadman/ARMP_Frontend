<div class="hr-admin-layout">
  <aside class="sidebar" aria-label="HR workspace">
    <div class="sidebar-brand">
      <h1 class="sidebar-title">HR workspace</h1>
      <p class="sidebar-sub">Recruitment, people, and governance.</p>
    </div>
    <nav class="sidebar-nav">
      <ng-container *ngFor="let group of menuGroups">
        <div class="nav-group-label">{{ group.label }}</div>
        <a
          *ngFor="let link of group.links"
          [routerLink]="link.route"
          routerLinkActive="active"
          class="sidebar-link">
          {{ link.label }}
        </a>
      </ng-container>
    </nav>
  </aside>
  <section class="workspace">
    <router-outlet></router-outlet>
  </section>
</div>
