<div class="page">
  <div class="page-header">
    <h1 class="page-title">User management</h1>
    <p class="page-sub">All registered users. SUPER_ADMIN only.</p>
  </div>

  <div class="table-wrap" *ngIf="!isLoading">
    <table class="user-table">
      <thead>
      <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Role</th>
        <th>Department</th>
        <th>Status</th>
        <th>Logins</th>
        <th></th>
      </tr>
      </thead>
      <tbody>
      <tr *ngFor="let user of users">
        <td>{{ user.firstName }} {{ user.lastName }}</td>
        <td>{{ user.email }}</td>
        <td>
          <span class="role-badge">{{ user.role }}</span>
        </td>
        <td>{{ user.department || '—' }}</td>
        <td>
            <span class="status-badge" [class.inactive]="!user.isActive">
              {{ user.isActive ? 'Active' : 'Inactive' }}
            </span>
        </td>
        <td>{{ user.totalLoginCount }}</td>
        <td>
          <button
            class="deactivate-btn"
            *ngIf="user.isActive"
            (click)="deactivateUser(user.id)">
            Deactivate
          </button>
        </td>
      </tr>
      </tbody>
    </table>

    <div class="empty" *ngIf="users.length === 0">
      No users found.
    </div>
  </div>
</div>
